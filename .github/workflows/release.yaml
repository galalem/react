name: Release
on:
  push:
    branches: [main]          # runs when changes land on main

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write         # to push version-bump commits/tags
      pull-requests: write     # to open the "Version Packages" PR
      id-token: write          # for npm provenance (optional, nice-to-have)
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }        # full history so it can detect changes
      - uses: pnpm/action-setup@v4
        with:
          version: 11.9.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Create Release PR or Publish
        uses: changesets/action@v1
        with:
          publish: pnpm release           # the script from Step 2
          version: pnpm version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
